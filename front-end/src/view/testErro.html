<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/assets/css/bootstrap.min.css">
    <style>
        body {
            background-color: rgb(39, 39, 39);
            opacity: 0.7;
        }

       #meuDialog {
            display: flex;
            align-items: center;
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgb(202, 12, 12);
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 100px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: top 0.7s ease;
        }

        #load {
            color: #fff;
        }

        #meuDialog.mostrar {
            top: 10px;
        }
    </style>
</head>

<body>
<button id="btn">Abrir modal</button>
    <button id="btnFechar">Fechar modal</button>

    <div id="meuDialog">
        <span id="load">Erro ao listar pacientes</span>
    </div>


    <!-- Seu conteúdo aqui -->
    <script src="/src/assets/js/testeLoading.js" type="module"></script>
</body>

</html>
